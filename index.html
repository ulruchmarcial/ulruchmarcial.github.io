document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:50px; border:1px solid var(--line-strong); border-radius:8px; font-size:18px;\">⌥<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SPEC SHEET -->\n    <div style=\"border:1px solid var(--line); border-radius:14px; background:var(--surface); overflow:hidden;\">\n      <div style=\"display:flex; align-items:center; gap:8px; padding:13px 18px; border-bottom:1px solid var(--line-soft); font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--faint);\">\n        <span style=\"width:9px; height:9px; border-radius:50%; background:#ff5f57;\"><\u002Fspan>\n        <span style=\"width:9px; height:9px; border-radius:50%; background:#febc2e;\"><\u002Fspan>\n        <span style=\"width:9px; height:9px; border-radius:50%; background:#28c840;\"><\u002Fspan>\n        <span style=\"margin-left:8px;\">profil — spec<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:8px 18px 14px; font-family:'IBM Plex Mono',monospace; font-size:13px;\">\n        <div style=\"display:flex; justify-content:space-between; gap:16px; padding:11px 0; border-bottom:1px solid var(--line-softer);\"><span style=\"color:var(--faint); flex-shrink:0;\">STATUT<\u002Fspan><span style=\"text-align:right;\">CPI — candidat à la<br>profession d'ingénieur<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; gap:16px; padding:11px 0; border-bottom:1px solid var(--line-softer);\"><span style=\"color:var(--faint); flex-shrink:0;\">FORMATION<\u002Fspan><span style=\"text-align:right;\">B.ing. génie info · 4ᵉ année<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; gap:16px; padding:11px 0; border-bottom:1px solid var(--line-softer);\"><span style=\"color:var(--faint); flex-shrink:0;\">DOMAINE<\u002Fspan><span style=\"text-align:right;\">Embarqué · IA · Réseaux &amp; Télécoms<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; gap:16px; padding:11px 0; border-bottom:1px solid var(--line-softer);\"><span style=\"color:var(--faint); flex-shrink:0;\">MOBILITÉ<\u002Fspan><span style=\"text-align:right;\">Québec &amp; international<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; gap:16px; padding:11px 0; border-bottom:1px solid var(--line-softer);\"><span style=\"color:var(--faint); flex-shrink:0;\">LANGUES<\u002Fspan><span style=\"text-align:right;\">FR natif · EN courant<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; gap:16px; padding:11px 0;\"><span style=\"color:var(--faint); flex-shrink:0;\">DISPO<\u002Fspan><span style=\"text-align:right; color:var(--accent-text);\">Stages &amp; emplois ✓<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- STATS -->\n  <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:1px; margin-top:64px; border:1px solid var(--grid-line); border-radius:14px; overflow:hidden; background:var(--grid-line);\">\n    <div style=\"background:var(--bg); padding:28px clamp(16px,2vw,32px);\"><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(34px,4vw,52px); letter-spacing:-.02em;\">8<span style=\"color:var(--accent-text);\">+<\u002Fspan><\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted); margin-top:4px;\">ANS D'EXPÉRIENCE<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:var(--bg); padding:28px clamp(16px,2vw,32px);\"><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(34px,4vw,52px); letter-spacing:-.02em;\">12<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted); margin-top:4px;\">PROJETS TECHNIQUES<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:var(--bg); padding:28px clamp(16px,2vw,32px);\"><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(34px,4vw,52px); letter-spacing:-.02em;\">3<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted); margin-top:4px;\">DIPLÔMES<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:var(--bg); padding:28px clamp(16px,2vw,32px);\"><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(34px,4vw,52px); letter-spacing:-.02em;\">2<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted); margin-top:4px;\">CONTINENTS<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT -->\n<section id=\"about\" style=\"max-width:1280px; margin:0 auto; padding:80px clamp(20px,5vw,64px);\">\n  <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent-text); letter-spacing:.06em; margin-bottom:40px;\">01 <span style=\"color:var(--faint);\">/<\u002Fspan> À PROPOS<\u002Fdiv>\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:clamp(32px,5vw,72px); align-items:start;\">\n    <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:clamp(28px,3.4vw,44px); line-height:1.1; letter-spacing:-.02em; margin:0;\">Un parcours forgé entre <span style=\"font-style:italic; color:var(--accent-text);\">deux continents<\u002Fspan>, à la croisée du matériel, des réseaux et de l'<span style=\"font-style:italic;\">intelligence<\u002Fspan>.<\u002Fh2>\n    <div>\n      <p style=\"font-size:16.5px; line-height:1.7; color:var(--text2); margin:0 0 18px; text-wrap:pretty;\">Formé en maintenance des systèmes informatiques et électroniques au Cameroun, j'ai consolidé mes compétences terrain pendant 8 ans comme responsable informatique avant de poursuivre un baccalauréat en génie informatique à l'UQTR.<\u002Fp>\n      <p style=\"font-size:16.5px; line-height:1.7; color:var(--muted); margin:0 0 28px; text-wrap:pretty;\">Mon approche est rigoureuse et orientée solution, avec une capacité éprouvée à diagnostiquer des problèmes complexes sous contrainte — temps, ressources, fiabilité. Du microcontrôleur au réseau d'entreprise, de l'OFDM au machine learning embarqué.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--text2); padding:7px 13px; border:1px solid var(--line); border-radius:100px;\">C · Python · Linux<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--text2); padding:7px 13px; border:1px solid var(--line); border-radius:100px;\">ML &amp; Edge AI<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--text2); padding:7px 13px; border:1px solid var(--line); border-radius:100px;\">Réseaux &amp; Télécoms<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--text2); padding:7px 13px; border:1px solid var(--line); border-radius:100px;\">Automatisation industrielle<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SKILLS -->\n<section id=\"skills\" style=\"max-width:1280px; margin:0 auto; padding:80px clamp(20px,5vw,64px);\">\n  <div style=\"display:flex; justify-content:space-between; align-items:flex-end; gap:24px; flex-wrap:wrap; margin-bottom:48px;\">\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent-text); letter-spacing:.06em; margin-bottom:18px;\">02 <span style=\"color:var(--faint);\">/<\u002Fspan> COMPÉTENCES<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:clamp(30px,4vw,54px); letter-spacing:-.02em; margin:0;\">Stack technique<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--faint); max-width:30ch; margin:0;\">Du bas niveau au déploiement — 9 domaines couverts.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; border:1px solid var(--grid-line); border-radius:14px; overflow:hidden; background:var(--grid-line);\">\n    <sc-for list=\"{{ skills }}\" as=\"skill\" hint-placeholder-count=\"9\">\n      <div style=\"background:var(--bg); padding:28px 26px; display:flex; flex-direction:column; min-height:230px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--faint);\">{{ skill.num }}<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.06em; color:var(--accent-text);\">{{ skill.level }}<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:20px; letter-spacing:-.01em; margin:0 0 10px;\">{{ skill.title }}<\u002Fh3>\n        <p style=\"font-size:14.5px; line-height:1.6; color:var(--muted); margin:0 0 18px; flex:1;\">{{ skill.desc }}<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:6px;\">\n          <sc-for list=\"{{ skill.tags }}\" as=\"tag\" hint-placeholder-count=\"5\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">{{ tag }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROJECTS -->\n<section id=\"projects\" style=\"max-width:1280px; margin:0 auto; padding:80px clamp(20px,5vw,64px);\">\n  <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent-text); letter-spacing:.06em; margin-bottom:18px;\">03 <span style=\"color:var(--faint);\">/<\u002Fspan> PROJETS<\u002Fdiv>\n  <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:clamp(30px,4vw,54px); letter-spacing:-.02em; margin:0 0 14px;\">Réalisations techniques<\u002Fh2>\n  <p style=\"font-size:16px; color:var(--muted); max-width:60ch; margin:0 0 36px; line-height:1.6;\">Projets académiques réalisés à l'UQTR — systèmes embarqués, IA, réseaux et calcul accéléré.<\u002Fp>\n\n  <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:40px;\">\n    <sc-for list=\"{{ filters }}\" as=\"f\" hint-placeholder-count=\"5\">\n      <button onclick=\"{{ f.onClick }}\" style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; padding:9px 18px; border-radius:100px; cursor:pointer; transition:all .15s; background:{{ f.bg }}; color:{{ f.color }}; border:1px solid {{ f.border }};\">{{ f.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:20px;\">\n    <sc-for list=\"{{ filteredProjects }}\" as=\"p\" hint-placeholder-count=\"12\">\n      <div style=\"border:1px solid var(--line); border-radius:14px; background:var(--surface); padding:26px 24px; display:flex; flex-direction:column; min-height:280px; transition:border-color .2s, transform .2s;\" style-hover=\"border-color:var(--accent-border); transform:translateY(-3px);\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;\">\n          <span style=\"font-size:24px;\">{{ p.icon }}<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent-text); padding:4px 10px; border:1px solid var(--accent-border); border-radius:5px;\">{{ p.code }}<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:18.5px; line-height:1.25; letter-spacing:-.01em; margin:0 0 12px;\">{{ p.title }}<\u002Fh3>\n        <p style=\"font-size:14px; line-height:1.6; color:var(--muted); margin:0 0 18px; flex:1; text-wrap:pretty;\">{{ p.desc }}<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;\">\n          <sc-for list=\"{{ p.tags }}\" as=\"tag\" hint-placeholder-count=\"4\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--tag-text); padding:3px 8px; background:var(--chip-bg); border-radius:5px;\">{{ tag }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--faint2); border-top:1px solid var(--line-softer); padding-top:14px;\">{{ p.course }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"text-align:center; margin-top:44px;\">\n    <a href=\"https://github.com/ulruchmarcial\" target=\"_blank\" style=\"display:inline-flex; align-items:center; gap:10px; padding:14px 28px; border:1px solid var(--line-strong); border-radius:8px; font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--text);\">⌥ Voir tous les projets sur GitHub →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EXPERIENCE -->\n<section id=\"experience\" style=\"max-width:1280px; margin:0 auto; padding:80px clamp(20px,5vw,64px);\">\n  <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent-text); letter-spacing:.06em; margin-bottom:18px;\">04 <span style=\"color:var(--faint);\">/<\u002Fspan> EXPÉRIENCE<\u002Fdiv>\n  <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:clamp(30px,4vw,54px); letter-spacing:-.02em; margin:0 0 48px;\">Parcours professionnel<\u002Fh2>\n\n  <!-- Research highlight -->\n  <div style=\"border:1px solid var(--accent-border); border-radius:16px; background:linear-gradient(180deg, var(--accent-glow), transparent); padding:34px clamp(24px,3vw,40px); margin-bottom:24px;\">\n    <div style=\"display:inline-flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent-text); margin-bottom:20px; padding:6px 12px; border:1px solid var(--accent-border); border-radius:100px;\">★ Bourse BRPC · CRSNG<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1.4fr; gap:clamp(24px,4vw,56px);\">\n      <div>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:24px; letter-spacing:-.01em; margin:0 0 10px;\">Chercheur — Co-conception sur RISC-V<\u002Fh3>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--muted); margin-bottom:4px;\">UQTR · Laboratoire LSSI<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent-text);\">En cours · Mai — Août 2026<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin-top:22px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">RISC-V<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">SNN / QNN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">ISA custom<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">Edge AI<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">LLM co-design<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:15.5px; line-height:1.7; color:var(--text2); margin:0 0 16px; text-wrap:pretty;\">Optimisation de l'inférence SNN–QNN sur plateforme RISC-V pour le contrôle de surfaces intelligentes reconfigurables (RIS) en communications sans fil — calcul approximatif, ISA personnalisée et co-conception assistée par LLM.<\u002Fp>\n        <ul style=\"margin:0; padding-left:18px; color:var(--muted); font-size:14.5px; line-height:1.75;\">\n          <li>Profilage des goulots d'étranglement d'un modèle SNN–QNN sur cœur RISC-V Ibex<\u002Fli>\n          <li>Calcul approximatif : réduction de précision, accumulation tronquée, exploitation de la parcimonie<\u002Fli>\n          <li>Extensions ISA personnalisées pour accélérer la mise à jour des états neuronaux<\u002Fli>\n          <li>Évaluation des compromis précision / latence / énergie sur cible embarquée<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Other roles -->\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px;\">\n    <div style=\"border:1px solid var(--line); border-radius:16px; background:var(--surface); padding:30px clamp(22px,2.5vw,34px);\">\n      <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:21px; margin:0 0 8px;\">Responsable Informatique<\u002Fh3>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--muted); margin-bottom:2px;\">DAK Services · Douala, Cameroun<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--faint); margin-bottom:18px;\">2015 — 2023<\u002Fdiv>\n      <p style=\"font-size:14.5px; line-height:1.65; color:var(--muted); margin:0 0 16px;\">Gestion de bout en bout de l'infrastructure informatique et électronique. Responsabilité totale de la fiabilité des systèmes critiques.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:6px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">Gestion de parc<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">Leadership<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">Systèmes critiques<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid var(--line); border-radius:16px; background:var(--surface); padding:30px clamp(22px,2.5vw,34px);\">\n      <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:21px; margin:0 0 8px;\">Technicien de Maintenance<\u002Fh3>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--muted); margin-bottom:2px;\">Transval · Douala, Cameroun<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--faint); margin-bottom:18px;\">2012 — 2014<\u002Fdiv>\n      <p style=\"font-size:14.5px; line-height:1.65; color:var(--muted); margin:0 0 16px;\">Maintenance électronique terrain en environnement industriel exigeant, au contact de matériels variés sous conditions contraintes.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:6px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">Électronique<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">Soudure<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--tag-text); padding:4px 9px; background:var(--chip-bg); border-radius:5px;\">Diagnostic<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT -->\n<section id=\"contact\" style=\"max-width:1280px; margin:0 auto; padding:80px clamp(20px,5vw,64px) 40px;\">\n  <div style=\"border:1px solid var(--line); border-radius:20px; background:var(--surface2); padding:clamp(40px,6vw,80px) clamp(28px,5vw,72px); text-align:center;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent-text); letter-spacing:.06em; margin-bottom:24px;\">05 <span style=\"color:var(--faint);\">/<\u002Fspan> CONTACT<\u002Fdiv>\n    <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(38px,6vw,82px); line-height:1; letter-spacing:-.03em; margin:0 0 24px;\">Travaillons <span style=\"font-style:italic; color:var(--accent-text);\">ensemble<\u002Fspan>.<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.6; color:var(--muted); max-width:54ch; margin:0 auto 40px; text-wrap:pretty;\">Disponible pour des stages, emplois, projets académiques collaboratifs ou opportunités professionnelles en systèmes embarqués et IA — mobile au Québec et à l'international. Je réponds rapidement.<\u002Fp>\n    <div style=\"display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin-bottom:32px;\">\n      <a href=\"mailto:Ulruch.Marcial.Ngomen@uqtr.ca\" style=\"display:inline-flex; align-items:center; gap:8px; padding:14px 26px; background:var(--accent-fill); color:var(--accent-ink); font-weight:600; font-size:15px; border-radius:8px;\">✉ Me contacter<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/ulruch-marcial-ngomen-cpi-a6b33931a\" target=\"_blank\" style=\"display:inline-flex; align-items:center; gap:8px; padding:14px 26px; border:1px solid var(--line-strong); font-size:15px; border-radius:8px; font-family:'IBM Plex Mono',monospace;\">in · LinkedIn<\u002Fa>\n      <a href=\"https://github.com/ulruchmarcial\" target=\"_blank\" style=\"display:inline-flex; align-items:center; gap:8px; padding:14px 26px; border:1px solid var(--line-strong); font-size:15px; border-radius:8px; font-family:'IBM Plex Mono',monospace;\">⌥ GitHub<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--faint);\">📍 Québec, Canada · Mobile<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"max-width:1280px; margin:0 auto; padding:32px clamp(20px,5vw,64px) 56px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; border-top:1px solid var(--line-soft);\">\n  <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--muted);\"><span style=\"color:var(--faint);\">&lt;<\u002Fspan>Ulruch Marcial Ngomen<span style=\"color:var(--accent-text);\">/<\u002Fspan><span style=\"color:var(--faint);\">&gt;<\u002Fspan><\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--faint2);\">© 2026 · Génie Informatique · UQTR<\u002Fdiv>\n  <a href=\"#hero\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted);\">↑ Retour en haut<\u002Fa>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { activeCat: 'tous', progress: 0, theme: 'dark' };\n\n  componentDidMount() {\n    let saved = 'dark';\n    try { saved = localStorage.getItem('umn-theme') || 'dark'; } catch (e) {}\n    document.documentElement.setAttribute('data-theme', saved);\n    this.setState({ theme: saved });\n\n    this._onScroll = () => {\n      const h = document.documentElement;\n      const max = h.scrollHeight - h.clientHeight;\n      const p = max > 0 ? (h.scrollTop / max) * 100 : 0;\n      this.setState({ progress: Math.min(100, Math.max(0, p)) });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  toggleTheme = () => {\n    const next = this.state.theme === 'dark' ? 'light' : 'dark';\n    document.documentElement.setAttribute('data-theme', next);\n    try { localStorage.setItem('umn-theme', next); } catch (e) {}\n    this.setState({ theme: next });\n  };\n\n  skills = [\n    { num: '01', title: 'Programmation embarquée', level: 'EXPERT', desc: 'Développement bas niveau sur microcontrôleurs, gestion mémoire, drivers matériels et systèmes temps réel.', tags: ['C', 'C++', 'STM32', 'FreeRTOS', 'I2C/SPI'] },\n    { num: '02', title: 'IA & Machine Learning', level: 'INTERMÉDIAIRE', desc: 'ML supervisé, deep learning (LSTM) et déploiement TinyML sur microcontrôleurs.', tags: ['Python', 'TensorFlow', 'Scikit-learn', 'TinyML', 'SHAP'] },\n    { num: '03', title: 'Linux & systèmes embarqués', level: 'AVANCÉ', desc: 'Cross-compilation, build du noyau, Buildroot et déploiement sur cibles ARM.', tags: ['Kernel', 'Buildroot', 'U-Boot', 'BusyBox', 'Shell'] },\n    { num: '04', title: 'Réseaux & télécommunications', level: 'AVANCÉ', desc: 'Architecture LAN/WAN, VLAN, DMZ, routage inter-VLAN, ACL et NAT sur Juniper.', tags: ['TCP/IP', 'VLAN', 'DMZ', 'NAT', 'Juniper'] },\n    { num: '05', title: 'Télécommunications & DSP', level: 'INTERMÉDIAIRE', desc: 'Systèmes OFDM temps réel sur SDR, traitement du signal et compensation RF.', tags: ['OFDM', 'SDR', 'BladeRF', 'DSP', 'MATLAB'] },\n    { num: '06', title: 'Automatisation industrielle', level: 'AVANCÉ', desc: 'Automates PLC en Ladder/GRAFCET, interfaces HMI et communication inter-automates.', tags: ['Ladder', 'GRAFCET', 'RSLogix', 'FactoryTalk', 'FESTO'] },\n    { num: '07', title: 'Calcul accéléré & FPGA', level: 'INTERMÉDIAIRE', desc: 'Programmation GPU en CUDA, optimisation de kernels et conception numérique VHDL.', tags: ['CUDA C', 'VHDL', 'GPU', 'Nsight', 'ModelSim'] },\n    { num: '08', title: 'Asservissement & contrôle', level: 'INTERMÉDIAIRE', desc: 'Modélisation dynamique, fonctions de transfert et correcteurs PID en simulation.', tags: ['MATLAB', 'Simulink', 'PID', 'Bode', 'Laplace'] },\n    { num: '09', title: 'Maintenance matérielle', level: 'EXPERT', desc: 'Diagnostic électronique, réparation de cartes et soudure de précision — 8 ans terrain.', tags: ['Diagnostic', 'Soudure', 'Altium', 'Oscilloscope'] },\n  ];\n\n  projects = [\n    { cat: 'embarque', icon: '🤖', code: 'GEI1049', title: 'Robot à chenilles — STM32 + Wiimote', desc: \"Pilotage d'un véhicule à chenilles sur STM32F446RE : PWM 2 kHz, 3 modes autonomes, commande manette Wii (I2C) et affichage LCD temps réel.\", tags: ['C', 'STM32', 'PWM', 'I2C'], course: 'Circuits numériques programmables' },\n    { cat: 'embarque', icon: '🌡️', code: 'GEI1083', title: 'Système STM32 — Capteurs I2C/SPI + FreeRTOS', desc: 'Lecture capteur humidité/température et gyroscope (I2C/SPI) sur STM32L4 sous FreeRTOS, transmission UART et journalisation CSV via app Python hôte.', tags: ['STM32L4', 'SPI', 'UART', 'FreeRTOS'], course: 'Conception de systèmes embarqués' },\n    { cat: 'linux', icon: '🐧', code: 'GEI1089', title: 'Linux embarqué RPi 5 — Cross-compilation', desc: 'Chaîne Crosstool-NG ciblant le Raspberry Pi 5 (ARM64) : build complet U-Boot, noyau Linux et BusyBox, déployé et démarré en laboratoire.', tags: ['Crosstool-NG', 'U-Boot', 'Kernel', 'ARM64'], course: \"Systèmes d'exploitation embarqués\" },\n    { cat: 'linux', icon: '⚙️', code: 'GEI1072', title: 'Buildroot — GUI de contrôle moteur', desc: 'Système Linux embarqué Buildroot pour RPi 5 avec PyQt5 : noyau et rootfs personnalisés, GUI de contrôle moteur intégrée via post-build.', tags: ['Buildroot', 'PyQt5', 'Python', 'RPi 5'], course: 'Résolution de problèmes en C' },\n    { cat: 'reseaux', icon: '🌐', code: 'GEI1091', title: 'Réseau sécurisé — VLAN, DMZ & NAT Juniper', desc: 'LAN à deux VLANs, DMZ (HTTP/FTP/RabbitMQ), routage inter-VLAN avec ACL et NAT source sur équipements Juniper réels.', tags: ['Juniper', 'VLAN', 'DMZ', 'NAT'], course: 'Réseaux informatiques' },\n    { cat: 'reseaux', icon: '📡', code: 'GEI1056', title: 'Transceiver SISO-OFDM sur BladeRF 2.0', desc: 'Transceiver OFDM temps réel sur BladeRF 2.0 : synchronisation, compensation CFO/STO, estimation de canal et analyse des imperfections RF.', tags: ['OFDM', 'SDR', 'MATLAB', 'DSP'], course: 'Systèmes de télécommunications' },\n    { cat: 'ia', icon: '🧠', code: 'GEI1092', title: 'Analyse de sentiment IMDb — TinyML Arduino', desc: 'Pipeline ML IMDb (TF-IDF + régression logistique) avec SHAP/LIME et empreinte carbone, quantifié et exporté en header C++ pour Arduino.', tags: ['Scikit-learn', 'TinyML', 'Arduino', 'C++'], course: \"Techniques d'IA\" },\n    { cat: 'ia', icon: '🔬', code: 'GEI1092', title: 'Analyse de sentiment — Bi-LSTM + TF Lite', desc: 'Réseau Bi-LSTM empilé (Keras) pour analyse de sentiment, explicabilité SHAP/LIME et conversion TensorFlow Lite pour déploiement embarqué.', tags: ['TensorFlow', 'Bi-LSTM', 'TF Lite', 'Keras'], course: \"Techniques d'IA\" },\n    { cat: 'reseaux', icon: '⚡', code: 'GEI1084', title: 'Inversion matricielle GPU — Massive MIMO CUDA', desc: 'Inversion matricielle massive MIMO (Neumann/NSA) en CUDA C : kernels optimisés (mémoire partagée, coalescing), profilage Nsight, validation MATLAB.', tags: ['CUDA C', 'GPU', 'MIMO', 'cHDL'], course: 'Architecture & calcul accéléré' },\n    { cat: 'embarque', icon: '🏭', code: 'GEI1087', title: 'Automatisation — PLC Micrologix + GRAFCET', desc: 'Automate Micrologix 1100 en Ladder (RSLogix 500) sur stations FESTO : GRAFCET, séquencement, communication inter-automates et IHM FactoryTalk.', tags: ['Ladder', 'PLC', 'GRAFCET', 'FESTO'], course: 'Automatisation industrielle' },\n    { cat: 'autre', icon: '🗄️', code: 'SMI1001', title: 'Base de données — Conférence scientifique', desc: 'Base Oracle pour conférence scientifique : modèle ER, 10+ requêtes SQL avancées et 5 triggers (contraintes temporelles, acceptation conditionnelle).', tags: ['Oracle SQL', 'Triggers', 'ER', 'SQL'], course: 'Bases de données I' },\n    { cat: 'embarque', icon: '📐', code: 'GEI1013', title: 'Asservissement — Correcteurs MATLAB', desc: \"Modélisation et asservissement d'un système physique : fonctions de transfert, réponse fréquentielle et correcteurs P/PI/PID validés en simulation.\", tags: ['MATLAB', 'Simulink', 'PID', 'Bode'], course: 'Asservissements linéaires' },\n  ];\n\n  filterDefs = [\n    { key: 'tous', label: 'Tous' },\n    { key: 'embarque', label: 'Embarqué' },\n    { key: 'ia', label: 'IA / ML' },\n    { key: 'reseaux', label: 'Réseaux & Télécoms' },\n    { key: 'linux', label: 'Systèmes Linux' },\n  ];\n\n  renderVals() {\n    const active = this.state.activeCat;\n    const filters = this.filterDefs.map(f => {\n      const on = f.key === active;\n      return {\n        label: f.label,\n        bg: on ? 'var(--accent-fill)' : 'transparent',\n        color: on ? 'var(--accent-ink)' : 'var(--muted)',\n        border: on ? 'var(--accent-fill)' : 'var(--line-strong)',\n        onClick: () => this.setState({ activeCat: f.key }),\n      };\n    });\n    const filteredProjects = active === 'tous'\n      ? this.projects\n      : this.projects.filter(p => p.cat === active);\n\n    return {\n      progress: this.state.progress,\n      themeIcon: this.state.theme === 'dark' ? '☀' : '☾',\n      toggleTheme: this.toggleTheme,\n      skills: this.skills,\n      filters,\n      filteredProjects,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
